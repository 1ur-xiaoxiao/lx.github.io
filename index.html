<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数学系课程总览</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #0f0f13;
  --surface: #1a1a24;
  --card: #22223a;
  --accent: #6c63ff;
  --accent2: #ff6584;
  --text: #e8e6f0;
  --muted: #9896a8;
  --glow: rgba(108,99,255,0.25);
  --font-heading: 'Noto Serif SC','Georgia',serif;
  --font-body: 'Noto Sans SC','Helvetica Neue',Arial,sans-serif;
  --radius: 16px;
}

html { scroll-behavior:smooth; font-size:16px; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  overflow-x: hidden;
}

/* Background animation */
body::before {
  content: '';
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(108,99,255,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(255,101,132,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(0,212,170,0.05) 0%, transparent 50%);
  animation: bgShift 20s ease-in-out infinite alternate;
  z-index: -1;
}

@keyframes bgShift {
  0% { transform: translate(0,0) rotate(0deg); }
  100% { transform: translate(-5%,-3%) rotate(3deg); }
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 60px;
  animation: fadeUp 0.8s ease-out;
}

.header h1 {
  font-family: var(--font-heading);
  font-size: clamp(2rem, 5vw, 3.2rem);
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 12px;
}

.header p {
  color: var(--muted);
  font-size: 1.1rem;
  font-weight: 300;
  letter-spacing: 0.5px;
}

/* Cards container */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
  gap: 32px;
  max-width: 860px;
  width: 100%;
}

/* Course card */
.course-card {
  position: relative;
  background: var(--surface);
  border: 1px solid rgba(108,99,255,0.12);
  border-radius: var(--radius);
  padding: 40px 36px;
  text-decoration: none;
  color: var(--text);
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1),
              box-shadow 0.35s cubic-bezier(0.4,0,0.2,1),
              border-color 0.35s;
  overflow: hidden;
  animation: fadeUp 0.8s ease-out backwards;
}

.course-card:nth-child(1) { animation-delay: 0.15s; }
.course-card:nth-child(2) { animation-delay: 0.3s; }

.course-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 4px;
  border-radius: var(--radius) var(--radius) 0 0;
  transition: height 0.35s;
}

.course-card.dm::before {
  background: linear-gradient(90deg, #6c63ff, #ff6584);
}

.course-card.prob::before {
  background: linear-gradient(90deg, #2b6cb0, #00d4aa);
}

.course-card:hover {
  transform: translateY(-6px);
  border-color: rgba(108,99,255,0.3);
  box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 40px var(--glow);
}

.course-card:hover::before {
  height: 6px;
}

.card-icon {
  font-size: 2.8rem;
  margin-bottom: 20px;
  display: block;
}

.card-title {
  font-family: var(--font-heading);
  font-size: 1.6rem;
  font-weight: 700;
  margin-bottom: 8px;
}

.card-subtitle {
  color: var(--muted);
  font-size: 0.95rem;
  margin-bottom: 20px;
  line-height: 1.6;
}

.card-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 24px;
}

.tag {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 500;
  background: rgba(108,99,255,0.1);
  color: var(--accent);
  border: 1px solid rgba(108,99,255,0.15);
}

.card-enter {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--accent);
  transition: gap 0.3s;
}

.course-card:hover .card-enter {
  gap: 12px;
}

.card-enter .arrow {
  transition: transform 0.3s;
}

.course-card:hover .card-enter .arrow {
  transform: translateX(4px);
}

/* Footer */
.footer {
  margin-top: 60px;
  color: var(--muted);
  font-size: 0.85rem;
  text-align: center;
  animation: fadeUp 0.8s ease-out 0.45s backwards;
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(24px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Responsive */
@media (max-width: 480px) {
  .cards {
    grid-template-columns: 1fr;
  }
  .course-card {
    padding: 32px 24px;
  }
}
</style>
</head>
<body>

<div class="header">
  <h1>数学系课程总览</h1>
  <p>机器学习与概率统计 · 在线复习指南</p>
</div>

<div class="cards">
  <a href="datamining.html" class="course-card dm">
    <span class="card-icon">📊</span>
    <div class="card-title">数据挖掘</div>
    <div class="card-subtitle">董平 · 机器学习中的统计思想<br>从线性回归到提升方法，以统计学视角审视经典算法</div>
    <div class="card-meta">
      <span class="tag">10 个章节</span>
      <span class="tag">Python 实现</span>
      <span class="tag">前置知识</span>
    </div>
    <div class="card-enter">进入课程 <span class="arrow">→</span></div>
  </a>

  <a href="概率论/index.html" class="course-card prob">
    <span class="card-icon">🎲</span>
    <div class="card-title">概率论与数理统计</div>
    <div class="card-subtitle">基于茆诗松教材 · 前四章系统梳理<br>零基础友好，核心概念与公式全覆盖</div>
    <div class="card-meta">
      <span class="tag">4 个章节</span>
      <span class="tag">附录速查</span>
      <span class="tag">公式整理</span>
    </div>
    <div class="card-enter">进入课程 <span class="arrow">→</span></div>
  </a>
</div>

<div class="footer">
  数学系 · 在线课程复习平台
</div>

</body>
</html>
